<!DOCTYPE html>
<html lang="fr" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS MMV - Apprentissage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Apprentissage MMV</h1>
        <div id="menu-cat">
            <button onclick="initGame('cat1')">Catégorie 1</button>
            <button onclick="initGame('cat2')">Catégorie 2</button>
        </div>
        <div class="card" id="game-container" style="display:none;">
            <div id="content"></div>
            <div class="controls">
                <button id="btnValid" onclick="validate()">Valider</button>
                <button id="btnNext" onclick="nextQuestion()" style="display:none;">Suivant</button>
            </div>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
