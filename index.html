<!DOCTYPE html>
<html lang="fr" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allyokou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Code Lyoko</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('game-tab')">Jeu</button>
            <button class="tab-btn" onclick="showTab('list-tab')">Toutes les questions</button>
        </div>

        <div id="game-tab" class="tab-content">
            <div id="menu-cat">
                <h2>Choisissez vos catégories :</h2>
                <div id="category-list"></div>
                <button id="btnStart" onclick="startSelectedGame()" style="margin-top: 20px; display: none;">Lancer la partie</button>
            </div>
            <div class="card" id="game-container" style="display:none;">
                <button onclick="backToMenu()">⬅ Retour au menu</button>
                <div id="content"></div>
                <div class="controls">
                    <button id="btnValid" onclick="validate()">Valider</button>
                    <button id="btnNext" onclick="nextQuestion()" style="display:none;">Suivant</button>
                </div>
            </div>
        </div>

        <div id="list-tab" class="tab-content" style="display:none;">
            <div id="list-menu">
                <h2>Sélectionnez les catégories à afficher :</h2>
                <div id="category-list-list"></div> <button id="btnShowList" onclick="displaySelectedQuestions()" style="margin-top: 20px;">Afficher les questions</button>
            </div>
            
            <div id="list-results" style="display:none; margin-top: 20px;">
                <button onclick="backToListMenu()">⬅ Retour à la sélection</button>
                <div id="all-questions-list"></div>
            </div>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
